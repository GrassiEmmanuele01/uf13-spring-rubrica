<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <title>Nuovo contatto</title>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold fs-4">
                <i class="bi bi-book me-2"></i>Spring Rubrica
            </span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">

                <div class="card border-0 shadow-sm">

                    <div class="card-header bg-primary text-white text-center py-4 border-0">
                        <div class="rounded-circle bg-white text-primary d-inline-flex align-items-center justify-content-center mb-2"
                             style="width: 64px; height: 64px;">
                            <i class="bi bi-person-plus-fill fs-2"></i>
                        </div>
                        <h5 class="mb-0 fw-bold">Nuovo Contatto</h5>
                    </div>

                    <div class="card-body px-4 py-4">
                        <form method="post" th:action="@{/new}" th:object="${contactForm}">

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-semibold">
                                    <i class="bi bi-person me-1"></i>Nome
                                </label>
                                <input th:field="*{name}" type="text"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                       placeholder="Es. Mario">
                                <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback">
                                    <span th:errors="*{name}"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-semibold">
                                    <i class="bi bi-person me-1"></i>Cognome
                                </label>
                                <input th:field="*{surname}" type="text"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('surname')} ? 'is-invalid'"
                                       placeholder="Es. Rossi">
                                <div th:if="${#fields.hasErrors('surname')}" class="invalid-feedback">
                                    <span th:errors="*{surname}"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-semibold">
                                    <i class="bi bi-telephone me-1"></i>Telefono
                                </label>
                                <input th:field="*{phone}" type="tel"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                       placeholder="Es. 3331234567"
                                       pattern="([0-9]{10})">
                                <div th:if="${#fields.hasErrors('phone')}" class="invalid-feedback">
                                    <span th:errors="*{phone}"></span>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted small fw-semibold">
                                    <i class="bi bi-envelope me-1"></i>E-mail
                                </label>
                                <input th:field="*{email}" type="email"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="email@example.com">
                                <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback">
                                    <span th:errors="*{email}"></span>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <input type="submit" value="Aggiungi"
                                       class="btn btn-primary btn-sm w-100">
                                <input type="reset" value="Svuota"
                                       class="btn btn-outline-secondary btn-sm w-100">
                            </div>

                        </form>
                    </div>

                    <div class="card-footer bg-transparent border-0 px-4 pb-4">
                        <a th:href="@{/}" class="btn btn-outline-primary btn-sm w-100">
                            <i class="bi bi-house me-1"></i> Torna alla Home
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
