<!DOCTYPE html>
<html lang="it" xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <title>Dettagli contatto</title>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold fs-4">
                <i class="bi bi-book me-2"></i>Spring Rubrica
            </span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">

                <div th:if="${newContact != null}" class="alert alert-success alert-dismissible fade show d-flex align-items-center" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span>Contatto salvato con successo!</span>
                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Chiudi"></button>
                </div>

                <div class="card border-0 shadow-sm">

                    <div class="card-header bg-primary text-white text-center py-4 border-0">
                        <div class="rounded-circle bg-white text-primary d-inline-flex align-items-center justify-content-center mb-2"
                             style="width: 64px; height: 64px;">
                            <i class="bi bi-person-fill fs-2"></i>
                        </div>
                        <h5 class="mb-0 fw-bold" th:text="${contact.name + ' ' + contact.surname}"></h5>
                    </div>

                    <div class="card-body px-4 py-3">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item px-0 d-flex align-items-center gap-2">
                                <i class="bi bi-telephone-fill text-primary"></i>
                                <div>
                                    <small class="text-muted d-block">Telefono</small>
                                    <span class="fw-semibold" th:text="${contact.phone}"></span>
                                </div>
                            </li>
                            <li class="list-group-item px-0 d-flex align-items-center gap-2">
                                <i class="bi bi-envelope-fill text-primary"></i>
                                <div>
                                    <small class="text-muted d-block">E-mail</small>
                                    <span class="fw-semibold" th:text="${contact.email}"></span>
                                </div>
                            </li>
                        </ul>
                    </div>

                    <div class="card-footer bg-transparent border-0 px-4 pb-4 d-flex gap-2">
                        <a th:href="@{/}" class="btn btn-primary btn-sm w-100">
                            <i class="bi bi-house me-1"></i> Home
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
