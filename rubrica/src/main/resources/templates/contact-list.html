<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <title>Lista contatti</title>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold fs-4">
                <i class="bi bi-book me-2"></i>Spring Rubrica
            </span>
        </div>
    </nav>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="text-secondary fw-semibold mb-0">
                <i class="bi bi-people me-1"></i> Lista Contatti
            </h5>
            <a th:href="@{/new}" class="btn btn-primary btn-sm">
                <i class="bi bi-person-plus me-1"></i> Nuovo Contatto
            </a>
        </div>

        <div th:if="${contactDeleted != null}" class="alert alert-warning alert-dismissible fade show d-flex align-items-center" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span>Contatto eliminato con successo.</span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Chiudi"></button>
        </div>

        <div th:if="${contacts}" class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover table-bordered align-middle mb-0">
                    <thead class="table-primary text-uppercase small">
                        <tr>
                            <th class="ps-3">Nome</th>
                            <th>Cognome</th>
                            <th>Telefono</th>
                            <th>Email</th>
                            <th class="text-center">Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${contacts}">
                            <td class="ps-3 fw-semibold" th:text="${c.name}"></td>
                            <td th:text="${c.surname}"></td>
                            <td>
                                <i class="bi bi-telephone text-muted me-1"></i>
                                <span th:text="${c.phone}"></span>
                            </td>
                            <td>
                                <i class="bi bi-envelope text-muted me-1"></i>
                                <span th:text="${c.email}"></span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{'/contact/delete/'+${c.id}}" class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-trash3 me-1"></i> Elimina
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(contacts)}" class="text-center text-muted py-5">
            <i class="bi bi-person-x fs-1 d-block mb-2"></i>
            <p class="fs-6">Nessun contatto presente.</p>
            <a th:href="@{/new}" class="btn btn-outline-primary btn-sm mt-1">
                <i class="bi bi-person-plus me-1"></i> Aggiungi il primo contatto
            </a>
        </div>

    </div>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
